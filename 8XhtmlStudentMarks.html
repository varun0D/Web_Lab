<!DOCTYPE html>
<html>
<head>
<title>Average Marks</title>

<script>
function calculateAverage()
{
    var reg = document.getElementById("reg").value;
    var sub = document.getElementById("sub").value;
    var t1 = parseInt(document.getElementById("t1").value);
    var t2 = parseInt(document.getElementById("t2").value);
    var t3 = parseInt(document.getElementById("t3").value);

    if(reg=="" || sub=="")
    {
        alert("Enter Register Number and Subject Code");
        return;
    }

    if(isNaN(t1) || isNaN(t2) || isNaN(t3))
    {
        alert("Enter all test marks");
        return;
    }

    var total = t1 + t2 + t3;
    var lowest = Math.min(t1, t2, t3);
    var average = (total - lowest) / 2;

    alert("Average of Best Two Tests = " + average);
}
</script>

</head>

<body>

<h2>Student Marks Form</h2>

<form>

Register Number :
<input type="text" id="reg"><br><br>

Subject Code :
<input type="text" id="sub"><br><br>

Test 1 :
<input type="number" id="t1"><br><br>

Test 2 :
<input type="number" id="t2"><br><br>

Test 3 :
<input type="number" id="t3"><br><br>

<input type="button" value="Calculate Average" onclick="calculateAverage()">

</form>

</body>
</html>
