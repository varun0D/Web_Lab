//index.html
<!DOCTYPE html>
<html>
<head>
    <title>Frames Example</title>
</head>

<frameset rows="50%,50%">
    
    <frameset cols="50%,50%">
        <frame src="red.html">
        <frame src="green.html">
    </frameset>

    <frameset cols="50%,50%">
        <frame src="blue.html">
        <frame src="yellow.html">
    </frameset>

</frameset>

</html>

//red.html
<!DOCTYPE html>
<html>
<body style="background-color:red;">
    <h2 align="center">Frame 1</h2>
</body>
</html>

//green.html
<!DOCTYPE html>
<html>
<body style="background-color:red;">
    <h2 align="center">Frame 1</h2>
</body>
</html>


//blue.html
<!DOCTYPE html>
<html>
<body style="background-color:blue; color:white;">
    <h2 align="center">Frame 3</h2>
</body>
</html>

//yellow.html
<!DOCTYPE html>
<html>
<body style="background-color:yellow;">
    <h2 align="center">Frame 4</h2>
</body>
</html>
