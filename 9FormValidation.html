<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <script>
        function validate() {

            var uid = document.getElementById("uid").value;
            var name = document.getElementById("name").value;
            var pass = document.getElementById("pass").value;
            var email = document.getElementById("email").value;

            // User ID
            if (uid.length < 5 || uid.length > 12) {
                alert("User ID must be 5 to 12 characters.");
                return false;
            }

            // Name
            var letters = /^[A-Za-z ]+$/;
            if (!letters.test(name) || name.length < 15) {
                alert("Name should contain only alphabets and minimum 15 characters.");
                return false;
            }

            // Password
            var password = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[@#$%^&*!]).{8}$/;
            if (!password.test(pass)) {
                alert("Password must be 8 characters with one uppercase, one number and one special character.");
                return false;
            }

            // Email
            var mail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!mail.test(email)) {
                alert("Invalid Email.");
                return false;
            }

            alert("Registration Successful");
            return true;
        }
    </script>
</head>

<body>

<h2>Registration Form</h2>

<form onsubmit="return validate()">

    User ID:
    <input type="text" id="uid"><br><br>

    Name:
    <input type="text" id="name"><br><br>

    Password:
    <input type="password" id="pass"><br><br>

    Email:
    <input type="text" id="email"><br><br>

    <input type="submit" value="Register">
    <input type="reset" value="Reset">

</form>

</body>
</html>
